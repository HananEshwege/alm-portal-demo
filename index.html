<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Device Lifecycle Management for Businesses</title>
<style>
:root {
  color-scheme: light;
  --bg: #FFFFFF; --bg-2: #F5F5F7; --bg-3: #FAFAFB;
  --text: #1D1D1F; --text-2: #6E6E73; --text-3: #A1A1A6;
  --border: rgba(0,0,0,0.08); --border-2: rgba(0,0,0,0.18);
  --accent: #0066CC; --accent-bg: #E8F1FB;
  --success: #00875A; --success-bg: #E6F4EC;
  --danger: #C53030; --danger-bg: #FBE8E8;
  --warn: #B45309; --warn-bg: #FCEFD9;
  --purple: #6E59E0; --purple-bg: #EFEBFD;
  --teal: #0F8F7B; --teal-bg: #E1F4F0;
  --ds-yellow: #FFCC00; --ds-yellow-2: #FFE680; --ds-orange: #F4A100;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg-2); color: var(--text);
  font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.apple-logo {
  width: 14px; height: 14px;
  fill: currentColor;
  display: inline-block;
}
.apple-logo svg { width: 100%; height: 100%; display: block; }

.global-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
}
.global-inner {
  max-width: 1400px; margin: 0 auto;
  padding: 12px 24px;
  display: flex; align-items: center; gap: 20px;
}
.brand-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: #1D1D1F; color: white;
  display: flex; align-items: center; justify-content: center;
}
.brand-mark .apple-logo { width: 14px; height: 16px; }
.brand-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; line-height: 1.2; }
.brand-sub { font-size: 12px; color: var(--text-2); }

.app-switcher {
  margin-left: auto;
  display: inline-flex;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 999px; padding: 3px;
}
.app-switcher button {
  background: transparent; border: none;
  padding: 6px 14px; font-size: 12px;
  color: var(--text-2); cursor: pointer;
  border-radius: 999px; font-weight: 500;
  transition: all 0.15s; font-family: inherit;
}
.app-switcher button.on {
  background: var(--bg); color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

.portal {
  max-width: 1400px; margin: 0 auto;
  display: grid; grid-template-columns: 240px 1fr;
  min-height: calc(100vh - 53px);
}
.sidebar {
  background: var(--bg);
  border-right: 1px solid var(--border);
  padding: 24px 12px;
  position: sticky; top: 53px;
  height: calc(100vh - 53px);
  overflow-y: auto;
}
.sb-section {
  font-size: 11px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.6px;
  font-weight: 600; padding: 8px 10px 6px;
}
.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  color: var(--text-2); font-size: 13px;
  cursor: pointer; transition: all 0.1s;
  margin-bottom: 2px; user-select: none;
}
.sb-item:hover { background: var(--bg-2); color: var(--text); }
.sb-item.on { background: var(--bg-2); color: var(--text); font-weight: 600; }
.sb-icon {
  width: 16px; height: 16px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-2); border-radius: 4px;
  font-size: 10px; font-weight: 600; color: var(--text-2);
}
.sb-count {
  margin-left: auto; font-size: 11px;
  background: var(--bg-2); color: var(--text-2);
  padding: 1px 8px; border-radius: 999px;
}
.sb-item.on .sb-count { background: var(--text); color: white; }

.main-area { padding: 28px 32px 60px; min-width: 0; }
.main-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 22px; gap: 16px; flex-wrap: wrap;
}
.main-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin: 0 0 4px; }
.main-sub { font-size: 13px; color: var(--text-2); margin: 0; }

.user-chip {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 6px 12px 6px 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 999px;
}
.user-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent-bg); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
}
.user-name { font-size: 12px; font-weight: 500; }
.user-role { font-size: 11px; color: var(--text-2); }

.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: visible;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.04);
}

.tiny { font-size: 12px; color: var(--text-2); }
b.strong { color: var(--text); font-weight: 600; }

.section-h {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 8px; flex-wrap: wrap; gap: 8px;
}
.section-h-l { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.subhead { font-size: 12px; color: var(--text-2); padding: 0 20px 14px; }

.card-body { padding: 0 20px 20px; }
.card-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px; gap: 12px;
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  border-radius: 0 0 16px 16px;
}

.proposal-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  background: var(--bg-2); color: var(--text-2);
  font-size: 11px; font-weight: 600;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}

.sort-control { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); position: relative; }
.sort-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 10px;
  font-size: 12px; color: var(--text);
  font-weight: 500; cursor: pointer;
  transition: all 0.15s; font-family: inherit;
}
.sort-btn:hover { border-color: var(--border-2); }
.sort-btn .caret { color: var(--text-3); font-size: 10px; }
.sort-btn.open { border-color: var(--text); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }

.opp {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  background: var(--bg);
  cursor: pointer;
  transition: all 0.15s;
}
.opp:hover { border-color: var(--border-2); transform: translateY(-1px); }
.opp.open { border-color: var(--text); background: var(--bg-3); }
.cust-mark {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; flex-shrink: 0;
}
.cm-blue { background: var(--accent-bg); color: var(--accent); }
.cm-purple { background: var(--purple-bg); color: var(--purple); }
.cm-teal { background: var(--teal-bg); color: var(--teal); }
.cm-warn { background: var(--warn-bg); color: var(--warn); }
.opp-mid { flex: 1; min-width: 0; }
.opp-name { font-size: 14px; font-weight: 600; line-height: 1.2; display: flex; align-items: center; gap: 8px; }
.opp-sub { font-size: 12px; color: var(--text-2); margin-top: 3px; }
.opp-eq { text-align: right; flex-shrink: 0; }
.opp-eq-val { font-size: 15px; font-weight: 600; color: var(--success); }
.opp-eq-lbl { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.urgency-badge {
  display: inline-flex; align-items: center; padding: 2px 8px;
  border-radius: 999px; background: var(--warn-bg); color: var(--warn);
  font-size: 11px; font-weight: 600;
}
.urgency-badge.crit { background: var(--danger-bg); color: var(--danger); }

.btn-sm {
  background: #1D1D1F; color: white;
  border: none; padding: 7px 14px;
  border-radius: 8px; font-size: 13px; font-weight: 500;
  cursor: pointer; flex-shrink: 0;
  transition: opacity 0.15s, transform 0.1s;
  font-family: inherit;
}
.btn-sm:hover { opacity: 0.85; }
.btn-sm:active { transform: scale(0.98); }
.btn-sm.ghost { background: transparent; color: var(--text); border: 1px solid var(--border-2); }
.btn-sm.ghost:hover { background: var(--bg-2); }
.btn-sm.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn-sm.danger:hover { background: var(--danger-bg); }

.divider { height: 1px; background: var(--border); margin: 22px 0; }

.detail-h { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.detail-h .cust-mark { width: 32px; height: 32px; font-size: 12px; }
.detail-name { font-size: 14px; font-weight: 600; }
.detail-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }

.filters {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  padding: 10px 12px; background: var(--bg-2);
  border-radius: 10px; margin-bottom: 14px;
  position: relative; overflow: visible;
}
.chip-wrap { position: relative; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 999px; padding: 5px 11px;
  font-size: 12px; cursor: pointer;
  transition: all 0.15s; user-select: none;
}
.chip:hover { border-color: var(--border-2); }
.chip-k { color: var(--text-2); }
.chip-v { color: var(--text); font-weight: 500; }
.chip.dashed { border-style: dashed; color: var(--text-2); }
.chip.open { border-color: var(--text); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
.chip .caret { color: var(--text-3); font-size: 10px; margin-left: 2px; }

.popover {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--bg);
  border: 1px solid var(--border-2);
  border-radius: 12px;
  box-shadow: 0 10px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  padding: 6px; min-width: 220px; z-index: 50;
}
.popover.right { left: auto; right: 0; }
.pop-head {
  font-size: 11px; color: var(--text-2);
  padding: 6px 10px 4px; font-weight: 500;
  letter-spacing: 0.3px; text-transform: uppercase;
}
.pop-opt {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  font-size: 13px; cursor: pointer;
  transition: background 0.1s; user-select: none;
}
.pop-opt:hover { background: var(--bg-2); }
.pop-opt.sel { color: var(--accent); font-weight: 500; }
.pop-opt .check {
  width: 14px; height: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); font-size: 13px;
}
.pop-divider { height: 1px; background: var(--border); margin: 4px 6px; }

.tbl-wrap {
  overflow: auto;
  max-height: 380px;
  border: 1px solid var(--border);
  border-radius: 10px;
}
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl thead th {
  position: sticky; top: 0;
  background: var(--bg);
  z-index: 1;
  box-shadow: inset 0 -1px 0 var(--border);
}
.tbl th {
  text-align: left; padding: 10px 8px; font-weight: 500;
  color: var(--text-2); font-size: 12px;
  white-space: nowrap;
}
.tbl td {
  padding: 12px 8px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.tbl tbody tr:hover { background: var(--bg-3); }
.tbl tr:last-child td { border-bottom: none; }
.pos { color: var(--success); font-weight: 600; }
.lender-tag {
  display: inline-block; font-size: 12px; padding: 3px 9px;
  border-radius: 999px; background: var(--accent-bg); color: var(--accent);
  font-weight: 500;
}
.cond-tag {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 999px; font-weight: 500;
}
.cond-excellent { background: var(--success-bg); color: var(--success); }
.cond-good { background: var(--accent-bg); color: var(--accent); }
.cond-fair { background: var(--warn-bg); color: var(--warn); }
.tbl .empty-row td { text-align: center; color: var(--text-2); font-size: 12px; padding: 14px; }

.action-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 16px; margin-top: 14px;
  border-top: 1px solid var(--border);
  gap: 12px; flex-wrap: wrap;
}
.summary { font-size: 13px; color: var(--text-2); }

.btn-p {
  background: #1D1D1F; color: white; border: none;
  padding: 9px 18px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  font-family: inherit;
}
.btn-p:hover { opacity: 0.85; }
.btn-p:active { transform: scale(0.98); }
.btn-p:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-g {
  background: transparent; color: var(--text);
  border: 1px solid var(--border-2);
  padding: 9px 18px; border-radius: 10px;
  font-size: 14px; cursor: pointer;
  transition: all 0.15s; font-family: inherit;
}
.btn-g:hover { background: var(--bg-2); }
.btn-success {
  background: var(--success); color: white; border: none;
  padding: 9px 18px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s; font-family: inherit;
}
.btn-success:hover { opacity: 0.9; }

.step { padding: 18px 20px; border-bottom: 1px solid var(--border); }
.step:last-of-type { border-bottom: none; }
.step-h { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg-2); color: var(--text-2);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
}
.step-num.done { background: var(--success-bg); color: var(--success); }
.step-num.active { background: var(--accent-bg); color: var(--accent); }
.step-t { font-size: 14px; font-weight: 600; }
.step-help { font-size: 12px; color: var(--text-2); margin-left: auto; }
.step-body { padding-left: 32px; font-size: 13px; }

.upload-zone {
  border: 1.5px dashed var(--border-2);
  border-radius: 12px; padding: 24px;
  background: var(--bg-2); color: var(--text-2);
  font-size: 13px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
  text-align: center; gap: 8px;
}
.upload-zone:hover {
  border-color: var(--accent); background: var(--accent-bg); color: var(--accent);
}
.upload-zone .upload-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--text-2);
}
.upload-zone strong { color: var(--text); font-weight: 600; }

.upload-progress {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}
.spin {
  width: 18px; height: 18px;
  border: 2px solid var(--border-2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.uploaded {
  background: var(--success-bg); color: var(--success);
  border: 1px solid var(--success);
  border-radius: 12px; padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.uploaded-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--success); color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; flex-shrink: 0;
}
.uploaded-meta { flex: 1; }
.uploaded-name { font-size: 13px; font-weight: 600; }
.uploaded-sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
.uploaded-actions { display: flex; gap: 8px; }
.btn-link {
  background: transparent; color: var(--success);
  border: 1px solid var(--success);
  padding: 6px 12px; border-radius: 8px;
  font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.btn-link:hover { background: var(--success); color: white; }

.rollup {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-top: 12px;
}
.mc {
  background: var(--bg-2);
  border-radius: 10px; padding: 12px 14px;
}
.mc-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; }
.mc-val { font-size: 20px; font-weight: 600; line-height: 1.1; letter-spacing: -0.3px; }
.rollup .mc { background: var(--bg); border: 1px solid var(--border); }
.equity-big {
  font-size: 24px; font-weight: 600; color: var(--success);
  letter-spacing: -0.4px;
}

.row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--text-2); }
.field .val {
  font-size: 13px; padding: 9px 12px;
  background: var(--bg-2);
  border-radius: 8px; border: 1px solid var(--border);
}
.field select, .field input {
  font-size: 13px; padding: 9px 12px;
  background: var(--bg);
  border-radius: 8px; border: 1px solid var(--border-2);
  font-family: inherit; color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.field select:focus, .field input:focus { border-color: var(--accent); }

.calc-row {
  display: grid;
  grid-template-columns: 2fr 0.7fr 1fr 0.9fr auto;
  gap: 12px;
  align-items: end;
  margin-top: 4px;
}
.calc-result {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  margin-top: 14px;
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;
}
.calc-cell-l { font-size: 11px; color: var(--text-2); }
.calc-cell-v { font-size: 18px; font-weight: 600; margin-top: 4px; letter-spacing: -0.3px; }
.calc-cell-v.pos { color: var(--success); }
.calc-cell-v.big { font-size: 22px; }
.calc-empty { color: var(--text-3); font-style: italic; font-size: 13px; }

.lender-eval {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  margin-bottom: 12px;
}
.lender-eval-head {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-2);
  text-transform: uppercase; letter-spacing: 0.4px;
  font-weight: 600; margin-bottom: 10px;
}
.lender-eval-list {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
}
.lender-eval-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  background: var(--bg); border: 1px solid var(--border);
  font-size: 12px;
}
.lender-eval-item.win {
  border-color: var(--success);
  background: var(--success-bg);
  color: var(--success);
  font-weight: 600;
}
.lender-eval-item .check {
  font-size: 14px; flex-shrink: 0;
}
.lender-eval-item .rate {
  margin-left: auto; font-family: ui-monospace, monospace;
  font-size: 11px; opacity: 0.7;
}

.lender-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px solid var(--success);
  border-radius: 10px;
}
.lender-mark {
  width: 32px; height: 32px; border-radius: 7px;
  background: var(--accent-bg); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; flex-shrink: 0;
}
.lender-info { flex: 1; }
.lender-name { font-size: 14px; font-weight: 600; }
.lender-status { font-size: 12px; color: var(--success); margin-top: 2px; }
.win-badge {
  background: var(--success); color: white;
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
}

.flow {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap; margin-top: 8px;
}
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  font-size: 12px;
  background: var(--bg-2); color: var(--text-2);
  transition: background 0.2s, color 0.2s;
}
.pill.done { background: var(--success-bg); color: var(--success); }
.pill.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }

<script>
const APPLE_LOGO_SVG = '<span class="apple-logo"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="white"/></svg></span>';

const customers = {
  acme: { id: 'acme', name: 'Acme Corp', orgId: '18439', tier: 'Strategic', activeDevices: 142, contact: 'Maya Rodriguez · VP IT', mark: 'cm-blue', initial: 'A' },
  globex: { id: 'globex', name: 'Globex Inc.', orgId: '20871', tier: 'Enterprise', activeDevices: 89, contact: 'James Park · IT Director', mark: 'cm-purple', initial: 'G' },
  initech: { id: 'initech', name: 'Initech', orgId: '15523', tier: 'Enterprise', activeDevices: 67, contact: 'Lisa Chen · CIO', mark: 'cm-teal', initial: 'I' },
  umbrella: { id: 'umbrella', name: 'Umbrella Corp', orgId: '21044', tier: 'Strategic', activeDevices: 234, contact: 'Albert W. · VP IT', mark: 'cm-warn', initial: 'U' }
};

const opportunities = [
  { customerId: 'acme', model: 'iPhone 15 Pro', count: 50, daysToEnd: 28, equity: 7250, condition: 'Good', newDevice: 'iPhone 17 Pro 256GB', unitPrice: 1199 },
  { customerId: 'globex', model: 'iPhone 15', count: 25, daysToEnd: 41, equity: 3400, condition: 'Good or better', newDevice: 'iPhone 17 256GB', unitPrice: 999 },
  { customerId: 'initech', model: 'MacBook Air M2', count: 18, daysToEnd: 67, equity: 1850, condition: 'Good', newDevice: 'MacBook Air M4 13" 256GB', unitPrice: 1299 }
];

const _deviceCache = {};
function genDevices(custId) {
  if (_deviceCache[custId]) return _deviceCache[custId];
  const opp = opportunities.find(o => o.customerId === custId);
  if (!opp) return { devices: [], total: 0 };
  const isMacBook = opp.model.includes('MacBook');
  const isPro = opp.model.includes('Pro');
  const count = opp.count;
  const targetTradeIn = (isMacBook ? 850 : (isPro ? 725 : 620)) * count;
  const targetPayoff = targetTradeIn - opp.equity;
  const targetRV = (isMacBook ? 720 : (isPro ? 530 : 450)) * count;
  const baseRV = targetRV / count;
  const basePayoff = targetPayoff / count;
  const baseTradeIn = targetTradeIn / count;
  const seeds = ['Q4X8','K72A','B19P','D55T','H03L','M88R','N21Y','J47W','L62E','C09S','R74G','T18B','Y56V','U93F','P40K','X22D','Z67M','A85L','B12N','S99H','D33P','E77Q','F44J','G29W','H66R','I12K','J88M','K55N','L23T','M91X','N67Y','O44Z','P12A','Q89B','R56C','S23D','T90E','U67F','V34G','W01H','X78I','Y45J','Z12K','A89L','B56M','C23N','D90O','E67P','F34Q','G01R'];
  let cumRV = 0, cumPayoff = 0, cumTradeIn = 0;
  const devices = [];
  for (let i = 0; i < count; i++) {
    let rv, payoff, tradeIn;
    if (i === count - 1) {
      rv = targetRV - cumRV;
      payoff = targetPayoff - cumPayoff;
      tradeIn = targetTradeIn - cumTradeIn;
    } else {
      const n1 = Math.sin(i * 0.713) * 25;
      const n2 = Math.cos(i * 0.547) * 22;
      const n3 = Math.sin(i * 0.391) * 30;
      rv = Math.round(baseRV + n1);
      payoff = Math.round(basePayoff + n2);
      tradeIn = Math.round(baseTradeIn + n3);
      cumRV += rv; cumPayoff += payoff; cumTradeIn += tradeIn;
    }
    const seed = seeds[i % seeds.length];
    const prefix = String.fromCharCode(76 + (i % 14));
    const num = ((i * 37) % 90) + 10;
    const variant = isMacBook ? '' : (i % 3 === 1 ? ' 128' : ' 256');
    const condRoll = (i * 17 + 3) % 10;
    const condition = condRoll < 3 ? 'Excellent' : (condRoll < 9 ? 'Good' : 'Fair');
    devices.push({
      serial: 'F2' + prefix + num + '···' + seed,
      device: opp.model + variant,
      ends: opp.daysToEnd + (i % 3),
      rv, payoff, tradeIn,
      equity: tradeIn - payoff,
      condition
    });
  }
  _deviceCache[custId] = { devices, total: count };
  return _deviceCache[custId];
}

  { id: 'D-2026-0147', customer: 'Globex Inc.', type: 'Lease upgrade', count: 12, status: 'Lender contract', statusClass: 'ds-progress', updated: '1 hr ago' },
  { id: 'D-2026-0145', customer: 'Initech', type: 'New lease', count: 30, status: 'Phobio shipping', statusClass: 'ds-progress', updated: '3 hr ago' },

function sortedOpportunities() {
  const tierRank = { 'Strategic': 0, 'Enterprise': 1, 'SMB': 2 };
  const arr = opportunities.slice();
  arr.sort((a, b) => {
    if (state.sortBy === 'urgency-equity') {
      if (a.daysToEnd !== b.daysToEnd) return a.daysToEnd - b.daysToEnd;
      return b.equity - a.equity;
    }
    if (state.sortBy === 'equity') return b.equity - a.equity;
    if (state.sortBy === 'count') return b.count - a.count;
    if (state.sortBy === 'tier') return tierRank[customers[a.customerId].tier] - tierRank[customers[b.customerId].tier];
    return 0;
  });
  return arr;
}
function urgencyClass(d) { return d <= 30 ? 'crit' : ''; }

function matchesFilters(d) {
  const condF = state.filters.condition;
  if (condF === 'excellent' && d.condition !== 'Excellent') return false;
  if (condF === 'good-or-better' && d.condition === 'Fair') return false;
  const leaseF = state.filters.leaseEnd;
  if (typeof leaseF === 'number' && d.ends > leaseF) return false;
  return true;
}

function applyFilterCleanup() {
  const matching = new Set(genDevices(state.activeCustomer).devices.filter(matchesFilters).map(d => d.serial));
  state.selectedSerials = new Set([...state.selectedSerials].filter(s => matching.has(s)));
}

function getDealTotals() {
  const { devices } = genDevices(state.activeCustomer);
  const sel = devices.filter(d => state.selectedSerials.has(d.serial));
  const totalPayoff = sel.reduce((s, d) => s + d.payoff, 0);
  const totalTradeIn = sel.reduce((s, d) => s + d.tradeIn, 0);
  return {
    count: sel.length,
    payoff: totalPayoff,
    tradeIn: totalTradeIn,
    equity: totalTradeIn - totalPayoff,
    sel
  };
}

function getQuoteAmount() {
  const opp = opportunities.find(o => o.customerId === state.activeCustomer);
  if (!opp) return 0;
  const totals = getDealTotals();
  return opp.unitPrice * totals.count;
}

function calculateMonthly() {
  const totals = getDealTotals();
  if (!state.amount || !state.term || totals.count === 0) return null;
  const net = state.amount - totals.equity;
  const perDevice = net / state.term / totals.count;
  return Math.max(5, Math.round(perDevice));
}

function setActiveCustomer(custId) {
  state.activeCustomer = custId;
  const opp = opportunities.find(o => o.customerId === custId);
  if (opp) {
    const thresholds = [30, 60, 90, 120];
    state.filters.leaseEnd = thresholds.find(t => opp.daysToEnd <= t) || 120;
  }
  const allDevices = genDevices(custId).devices;
  state.selectedSerials = new Set(allDevices.filter(matchesFilters).map(d => d.serial));
  state.resellerNav = 'devices';
  state.openPopover = null;
  render();
}

        <div class="section-h-l"><span class="dot" style="background:${state.cfoStep === 'signed' ? 'var(--success)' : 'var(--accent)'}"></span>${sl}</div>
        <span class="tiny">Proposal #${PROPOSAL_ID}</span>
      </div>
      <div class="card-body" style="padding-top:0">
        <div class="flow" style="margin-top:0">
          <span class="pill ${['cfo-approved','lender-approved','signed'].includes(state.cfoStep) ? 'done' : 'active'}">Review proposal</span>
          <span class="arr">→</span>
          <span class="pill ${['lender-approved','signed'].includes(state.cfoStep) ? 'done' : (state.cfoStep === 'cfo-approved' ? 'active' : '')}">Lender approval</span>
          <span class="arr">→</span>
          <span class="pill ${state.cfoStep === 'signed' ? 'done' : (state.cfoStep === 'lender-approved' ? 'active' : '')}">Sign contract</span>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="section-h"><div class="section-h-l">Proposal summary</div></div>
      <div class="proposal-hero">
        <div class="proposal-side" style="background:var(--accent-bg)">
          <h3 style="color:var(--accent)">You will return</h3>
          <div class="big" style="color:var(--accent)">${totals.count} × ${oldDevice}</div>
          <div class="sub" style="color:var(--accent)">Trade-in value: ${fmt(totals.tradeIn)}</div>
        </div>
        <div class="proposal-side" style="background:var(--success-bg)">
          <h3 style="color:var(--success)">You will receive</h3>
          <div class="big" style="color:var(--success)">${totals.count} × ${newDevice}</div>
          <div class="sub" style="color:var(--success)">${state.term}-month lease · ${fmt(monthly)} per device / month</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="section-h"><div class="section-h-l">Devices being returned</div><span class="tiny">${totals.count} ${oldDevice}</span></div>
      <div class="return-list">
        <div class="return-tbl-h"><div>Device</div><div>Serial</div><div>Condition</div><div>Trade-in</div><div>Outstanding</div></div>
        ${showSel.map(d => `<div class="return-row"><div class="device">${d.device}</div><div class="serial">${d.serial}</div><div><span class="cond-tag cond-${d.condition.toLowerCase()}">${d.condition}</span></div><div>${fmt(d.tradeIn)}</div><div>${fmt(d.payoff)}</div></div>`).join('')}
        ${hiddenCount > 0 ? `<div style="text-align:center;color:var(--text-2);font-size:12px;padding:10px">+ ${hiddenCount} more devices</div>` : ''}
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="section-h"><div class="section-h-l">Cost breakdown</div></div>
      <div class="card-body">
        <table class="cost-table">
          <tr><td>Lease amount (${totals.count} × ${newDevice})</td><td>${fmt(state.amount)}</td></tr>
          <tr><td>Term</td><td>${state.term} months</td></tr>
          <tr><td>Equity applied (from device returns)</td><td class="pos">−${fmt(totals.equity)}</td></tr>
          <tr><td>Net amount financed</td><td>${fmt(state.amount - totals.equity)}</td></tr>
          <tr><td>Monthly per device</td><td>${fmt(monthly)}</td></tr>
          <tr><td>Total monthly (all ${totals.count} devices)</td><td>${fmt(monthly * totals.count)}</td></tr>
          <tr><td>Total cost over ${state.term} months</td><td>${fmt(totalOverTerm)}</td></tr>
        </table>
      </div>
    </div>

    ${state.cfoStep === 'pending' ? `
      <div class="card">
        <div class="card-foot" style="border-top:none;border-radius:16px">
          <span class="tiny">Approving sends this to JPM Equipment Finance for lender approval.</span>
          <div style="display:flex;gap:10px">
            <button class="btn-sm danger" id="declineBtn">Decline</button>
            <button class="btn-sm ghost" id="requestChangesBtn">Request changes</button>
            <button class="btn-success" id="approveProposalBtn">Approve proposal</button>
          </div>
        </div>
      </div>
    ` : ''}

    ${state.cfoStep === 'cfo-approved' ? `
      <div class="card" style="margin-bottom:16px">
        <div class="section-h"><div class="section-h-l"><span class="dot" style="background:var(--accent)"></span>Lender review in progress</div><span class="tiny">JPM Equipment Finance</span></div>
        <div class="card-body">
          <div class="note"><span class="i">i</span><span>Your approval is locked in. JPM is reviewing the lease agreement. This typically takes <b style="color:inherit;font-weight:600">up to 24 hours</b>. You'll be notified by email when the contract is ready to sign.</span></div>
          <div style="display:flex;justify-content:center;padding:20px"><button class="btn-success" id="simulateLenderApproveBtn">Simulate lender approval (demo)</button></div>
        </div>
      </div>
    ` : ''}

    ${state.cfoStep === 'lender-approved' ? `
      <div class="card" style="margin-bottom:16px">
        <div class="section-h"><div class="section-h-l"><span class="dot" style="background:var(--success)"></span>Sign contract</div><span class="tiny">Master Lease Agreement #${PROPOSAL_ID}</span></div>
        <div class="card-body">
          <div class="note" style="background:var(--success-bg);color:var(--success)"><span class="i" style="background:var(--success)">✓</span><span>JPM Equipment Finance has approved. Sign below via DocuSign to complete the lease.</span></div>
          <div class="ds-frame">
            <div class="ds-toolbar">
              <span class="ds-logo">DocuSign</span>
              <span class="ds-toolbar-meta">Master Lease Agreement #${PROPOSAL_ID} · 1 signature required</span>
              <span class="tiny" style="color:#6B5800">Secure</span>
            </div>
            <div class="ds-doc">
              <div class="ds-paper">
                <h4>Master Lease Agreement #${PROPOSAL_ID}</h4>
                <div class="clause"><strong>Lessor:</strong> JPM Equipment Finance · <strong>Lessee:</strong> ${cust.name} (Org ID ${cust.orgId})</div>
                <div class="clause"><strong>Equipment:</strong> ${totals.count} × ${newDevice}</div>
                <div class="clause"><strong>Term:</strong> ${state.term} months · <strong>Monthly per device:</strong> ${fmt(monthly)} · <strong>Total monthly:</strong> ${fmt(monthly * totals.count)}</div>
                <div class="clause"><strong>Trade-in credit applied:</strong> ${fmt(totals.equity)}</div>
                <div class="clause" style="margin-top:14px;font-size:11px;color:var(--text-2)">By signing below, the lessee agrees to the standard JPM Equipment Finance Master Lease Agreement terms, including monthly payment schedule, end-of-lease options, and equipment return obligations as described in Schedule A.</div>
                <div class="ds-sig-area" style="position:relative">
                  <span class="ds-sig-tag" style="top:-22px">Sign</span>
                  <div style="flex:1">
                    <div class="ds-sig-line ${state.signatureName ? 'signed' : ''}">${state.signatureName || ''}</div>
                    <div>Authorized signatory · ${cust.contact}</div>
                  </div>
                  <div>
                    <div style="font-size:11px;color:var(--text-2)">Date</div>
                    <div style="font-size:12px">${new Date().toLocaleDateString()}</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="ds-action">
              <input type="text" id="sigInput" placeholder="Type your full name to agree and sign" value="${state.signatureName}" />
              <button class="ds-sign-btn" id="signBtn" ${!state.signatureName ? 'disabled' : ''}>Agree and Sign</button>
            </div>
            <div class="ds-foot">Signed via DocuSign · An audit trail will be emailed to all parties.</div>
          </div>
        </div>
      </div>
    ` : ''}

    ${state.cfoStep === 'signed' ? `
      <div class="card" style="margin-bottom:16px">
        <div class="section-h"><div class="section-h-l"><span class="dot" style="background:var(--success)"></span>All complete</div><span class="tiny">Signed via DocuSign just now</span></div>
        <div class="card-body">
          <div class="ds-frame">
            <div class="ds-toolbar"><span class="ds-logo">DocuSign</span><span class="ds-toolbar-meta">Completed · ${new Date().toLocaleDateString()}</span><span class="tiny" style="color:var(--success);font-weight:600">✓ Signed</span></div>
            <div class="ds-doc">
              <div class="ds-paper">
                <h4>Master Lease Agreement #${PROPOSAL_ID}</h4>
                <div class="clause" style="color:var(--success);font-weight:600">✓ All parties signed</div>
                <div class="ds-sig-area">
                  <div style="flex:1">
                    <div class="ds-sig-line signed">${state.signatureName}</div>
                    <div>${cust.contact} · Signed ${new Date().toLocaleDateString()}</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="ds-foot">Audit trail emailed · Contract on file with JPM Equipment Finance</div>
          </div>
          <div style="margin-top:16px">
            <div class="rollup">
              <div class="mc"><div class="mc-label">Contract</div><div class="mc-val" style="font-size:14px">On file with JPM</div><div class="tiny" style="margin-top:4px">Master Lease Agreement #${PROPOSAL_ID}</div></div>
              <div class="mc"><div class="mc-label">New devices</div><div class="mc-val" style="font-size:14px">Shipping in 2–3 days</div><div class="tiny" style="margin-top:4px">${totals.count} × ${newDevice}</div></div>
              <div class="mc"><div class="mc-label">Return devices</div><div class="mc-val" style="font-size:14px">Labels emailed</div><div class="tiny" style="margin-top:4px">Phobio · ship within 14 days</div></div>
            </div>
          </div>
          <div style="display:flex;justify-content:center;padding:20px 0 0"><button class="btn-g" id="cfoResetBtn">Return to pending</button></div>
        </div>
      </div>
    ` : ''}
  `;
}

          <line x1="140" y1="238" x2="140" y2="298" stroke="#A1A1A6" stroke-width="1.5" marker-end="url(#arr)"/>
          <line x1="400" y1="238" x2="400" y2="298" stroke="#A1A1A6" stroke-width="1.5" marker-end="url(#arr)"/>

function render() {
  const root = document.getElementById('portalRoot');
  const isReseller = state.app === 'reseller';
  const sidebar = isReseller ? renderResellerSidebar() : renderCustomerSidebar();
  let content;
  if (isReseller) {
    if (state.resellerNav === 'devices') content = renderDevicesPage();
    else if (state.resellerNav === 'customers') content = renderCustomersPage();
    else if (state.resellerNav === 'deals') content = renderDealsPage();
    else if (state.resellerNav === 'reports') content = renderPlaceholderPage('Reports', 'Portfolio insights, conversion rates, equity trends.');
    else content = renderPlaceholderPage('Settings', 'Manage your account, integrations and notifications.');
  } else {
    content = renderCustomerApp();
  }
  root.innerHTML = `<div class="portal"><aside class="sidebar">${sidebar}</aside><main class="main-area">${content}</main></div>`;
}

function openQuoteModal() {
  const cust = customers[state.activeCustomer];
  const totals = getDealTotals();
  const opp = opportunities.find(o => o.customerId === state.activeCustomer);
  const newDevice = opp ? opp.newDevice : 'iPhone 17 Pro 256GB';
  const sku = newDevice.includes('iPhone 17 Pro') ? 'MTUW3LL/A' : (newDevice.includes('iPhone 17') ? 'MTUC3LL/A' : 'MWGM3LL/A');
  const unit = opp ? opp.unitPrice : 1199;
  const total = unit * totals.count;
  const modal = document.getElementById('quoteModal');
  modal.innerHTML = `
    <div class="modal-card">
      <div class="modal-header">
        <h2>Quote preview · ${cust.name.replace(/[. ]/g,'_')}_iPhone17_Quote_Q2.pdf</h2>
        <button class="modal-close" id="closeQuoteModal">×</button>
      </div>
      <div class="modal-body">
        <div class="quote-page">
          <div class="quote-header">
            <div class="quote-reseller"><strong>Connection Inc.</strong><br>Apple Authorized Reseller · AAR-1842<br>245 Park Ave, New York, NY 10167<br>quotes@connection.com · (212) 555-0148</div>
            <div class="quote-meta">Quote #Q-2026-3041<br>Issue: ${new Date().toLocaleDateString()}<br>Valid through: ${new Date(Date.now()+30*86400000).toLocaleDateString()}</div>
          </div>
          <div class="quote-customer"><strong>Bill to:</strong> ${cust.name}<br>Org ID: ${cust.orgId}<br>1 ${cust.name.split(' ')[0]} Way, San Francisco, CA 94105<br>Attn: ${cust.contact}</div>
          <table class="quote-items">
            <thead><tr><th>SKU</th><th>Description</th><th>Qty</th><th>Unit price</th><th>Total</th></tr></thead>
            <tbody>
              <tr><td>${sku}</td><td>${newDevice} · Natural Titanium</td><td>${totals.count}</td><td>${fmt(unit)}.00</td><td>${fmt(total)}.00</td></tr>
              <tr><td>S8888LL/A</td><td>AppleCare+ for iPhone (24mo) — bundled</td><td>${totals.count}</td><td>$0.00</td><td>$0.00</td></tr>
            </tbody>
          </table>
          <div class="quote-totals">
            Subtotal: ${fmt(total)}.00<br>
            Tax: not applicable for lease-financed orders<br>
            Freight: $0.00<br>
            <strong>Total: ${fmt(total)}.00</strong>
          </div>
          <div class="quote-foot">Payment terms: Lease-financed via JPM Equipment Finance · Authorized signature: ____________ · Contact: Sam Reeves · Connection Inc.</div>
        </div>
      </div>
    </div>
  `;
  modal.classList.add('on');
}

function closeQuoteModal() {
  document.getElementById('quoteModal').classList.remove('on');
}

function startUpload() {
  state.quoteState = 'uploading';
  render();
  setTimeout(() => {
    state.quoteState = 'uploaded';
    state.amount = getQuoteAmount();
    state.monthlyCalculated = null;
    render();
    showToast(`Quote parsed · amount auto-extracted: ${fmt(state.amount)}`);
  }, 1100);
}

document.getElementById('appSwitcher').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-app]');
  if (!btn) return;
  state.app = btn.dataset.app;
  document.querySelectorAll('#appSwitcher button').forEach(b => b.classList.toggle('on', b === btn));
  state.openPopover = null;
  render();
});

document.addEventListener('click', (e) => {
  if (e.target.id === 'closeQuoteModal' || e.target.classList.contains('modal-overlay')) { closeQuoteModal(); return; }

  const sbItem = e.target.closest('.sb-item[data-nav]');
  if (sbItem) {
    if (state.app === 'reseller') state.resellerNav = sbItem.dataset.nav;
    else state.customerNav = sbItem.dataset.nav;
    state.openPopover = null;
    render(); return;
  }

  if (state.openPopover && !e.target.closest('.popover') && !e.target.closest('.chip[data-pop]') && !e.target.closest('#sortBtn')) {
    state.openPopover = null; render(); return;
  }

  const sortBtn = e.target.closest('#sortBtn');
  if (sortBtn) { state.openPopover = state.openPopover === 'sort' ? null : 'sort'; render(); return; }

  const sortOpt = e.target.closest('[data-sort]');
  if (sortOpt) { state.sortBy = sortOpt.dataset.sort; state.openPopover = null; render(); showToast('Sort updated'); return; }

  const popChip = e.target.closest('[data-pop]');
  if (popChip) { state.openPopover = state.openPopover === popChip.dataset.pop ? null : popChip.dataset.pop; render(); return; }

  const leaseOpt = e.target.closest('[data-lease]');
  if (leaseOpt) { const v = leaseOpt.dataset.lease; state.filters.leaseEnd = v === 'custom' ? 'custom' : parseInt(v, 10); state.openPopover = null; applyFilterCleanup(); render(); showToast('Filter updated'); return; }

  const condOpt = e.target.closest('[data-cond]');
  if (condOpt) { state.filters.condition = condOpt.dataset.cond; state.openPopover = null; applyFilterCleanup(); render(); showToast('Filter updated'); return; }

  const reviewBtn = e.target.closest('button[data-cust]');
  if (reviewBtn) { setActiveCustomer(reviewBtn.dataset.cust); return; }

  const oppRow = e.target.closest('.opp[data-cust]');
  if (oppRow && !e.target.closest('button')) { setActiveCustomer(oppRow.dataset.cust); return; }

  const custRow = e.target.closest('.cust-row[data-cust]');
  if (custRow) { setActiveCustomer(custRow.dataset.cust); return; }

  if (e.target.id === 'createDealBtn') {
    if (state.selectedSerials.size === 0) return;
    state.dealStatus = 'draft';
    state.quoteState = 'empty';
    state.amount = 0;
    state.monthlyCalculated = null;
    render();
    setTimeout(() => {
      const el = document.getElementById('newDealSection');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 30);
    showToast('Deal draft created · upload the reseller quote to continue');
    return;
  }
  if (e.target.id === 'uploadZone' || e.target.closest('#uploadZone')) { startUpload(); return; }
  if (e.target.id === 'replaceQuoteBtn') { state.quoteState = 'empty'; state.amount = 0; state.monthlyCalculated = null; render(); return; }
  if (e.target.id === 'viewQuoteBtn') { openQuoteModal(); return; }

  if (e.target.id === 'calcBtn') {
    state.monthlyCalculated = calculateMonthly();
    render();
    showToast(state.monthlyCalculated ? `Monthly per device: ${fmt(state.monthlyCalculated)}` : 'Calculation failed');
    return;
  }
  if (e.target.id === 'submitDealBtn') { state.dealStatus = 'submitted'; state.cfoStep = 'pending'; render(); showToast('Deal submitted · switch to Customer portal to approve'); return; }
  if (e.target.id === 'saveDraftBtn') { showToast('Draft saved'); return; }
  if (e.target.id === 'newDealBtn') { state.dealStatus = 'none'; state.cfoStep = 'pending'; state.signatureName = ''; state.quoteState = 'empty'; state.amount = 0; state.monthlyCalculated = null; render(); return; }

  if (e.target.id === 'approveProposalBtn') { state.cfoStep = 'cfo-approved'; render(); showToast('Proposal approved · sent to lender'); return; }
  if (e.target.id === 'declineBtn') { showToast('Proposal declined (demo)'); return; }
  if (e.target.id === 'requestChangesBtn') { showToast('Changes requested (demo)'); return; }
  if (e.target.id === 'simulateLenderApproveBtn') { state.cfoStep = 'lender-approved'; render(); showToast('Lender approved · ready to sign'); return; }
  if (e.target.id === 'signBtn') { state.cfoStep = 'signed'; render(); showToast('Signed via DocuSign · all complete'); return; }
  if (e.target.id === 'cfoResetBtn') { state.cfoStep = 'pending'; state.signatureName = ''; render(); return; }
});

document.addEventListener('change', (e) => {
  if (e.target.id === 'selectAll') {
    const visible = genDevices(state.activeCustomer).devices.filter(matchesFilters);
    if (e.target.checked) visible.forEach(d => state.selectedSerials.add(d.serial));
    else visible.forEach(d => state.selectedSerials.delete(d.serial));
    render(); return;
  }
  if (e.target.dataset.serial) {
    if (e.target.checked) state.selectedSerials.add(e.target.dataset.serial);
    else state.selectedSerials.delete(e.target.dataset.serial);
    render(); return;
  }
  if (e.target.id === 'termSel') { state.term = parseInt(e.target.value, 10); state.monthlyCalculated = null; render(); return; }
});

document.addEventListener('input', (e) => {
  if (e.target.id === 'sigInput') {
    state.signatureName = e.target.value;
    const signBtn = document.getElementById('signBtn');
    if (signBtn) signBtn.disabled = !state.signatureName;
    const sigLine = document.querySelector('.ds-sig-line');
    if (sigLine) {
      sigLine.textContent = state.signatureName;
      if (state.signatureName) sigLine.classList.add('signed');
      else sigLine.classList.remove('signed');
    }
    return;
  }
  if (e.target.id === 'custSearch') {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('#custList .cust-row').forEach(row => {
      const txt = row.textContent.toLowerCase();
      row.style.display = txt.includes(q) ? '' : 'none';
    });
  }
});

state.selectedSerials = new Set(genDevices('acme').devices.filter(matchesFilters).map(d => d.serial));
render();
</script>

</body>
</html>
